<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada · Go Detailing</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" href="assets/img/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#080808;--graphite:#141414;--gold:#c09a50;--gold-hi:#d4ae6a;--pearl:#e2e0db;--silver:#999;--dim:#555}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--pearl);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;background-image:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(192,154,80,.06),transparent 70%)}
.wrap{max-width:560px}
.code{font-family:'Bebas Neue',sans-serif;font-size:clamp(7rem,22vw,13rem);line-height:.9;color:var(--gold);letter-spacing:.04em}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);letter-spacing:.06em;color:var(--pearl);margin:1rem 0 1.2rem}
p{font-size:.95rem;color:var(--silver);line-height:1.8;margin-bottom:2.4rem}
.actions{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center}
a.btn{display:inline-flex;align-items:center;gap:.5rem;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;padding:.95rem 2rem;transition:.3s;text-decoration:none}
.btn-gold{background:var(--gold);color:var(--black)}
.btn-gold:hover{background:var(--gold-hi)}
.btn-ghost{border:1px solid rgba(192,154,80,.4);color:var(--pearl)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.kicker{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Go Detailing · Alt Empordà</div>
  <div class="code">404</div>
  <h1>Esta página se nos ha escapado</h1>
  <p>La dirección que buscas no existe o se ha movido. Vuelve al inicio o escríbenos directamente por WhatsApp y te ayudamos.</p>
  <div class="actions">
    <a href="/" class="btn btn-gold">Volver al inicio</a>
    <a href="https://wa.me/34694270166?text=Hola%2C%20quiero%20información%20sobre%20vuestros%20servicios." class="btn btn-ghost" target="_blank" rel="noopener">Escribir por WhatsApp</a>
  </div>
</div>
</body>
</html>
